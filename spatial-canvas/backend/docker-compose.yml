version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: spatial_canvas_db
    environment:
      POSTGRES_DB: spatial_canvas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - spatial_network

  backend:
    build: .
    container_name: spatial_canvas_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/spatial_canvas
      AUTH_SERVICE_URL: http://auth_service:8001
      API_V1_STR: /api/v1
      PROJECT_NAME: SPATIAL CANVAS
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-development-secret-key-change-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 30
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    networks:
      - spatial_network
      - auth_network

  auth_service:
    image: spatial_canvas_backend  # Using same image for auth service
    container_name: auth_service
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/auth_service
      API_V1_STR: /api/v1
      PROJECT_NAME: Auth Service
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-development-secret-key-change-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 30
    ports:
      - "8001:8001"
    volumes:
      - ../shared/auth/app:/app/app
      - ../shared/auth/alembic.ini:/app/alembic.ini
      - ../shared/auth/alembic:/app/alembic
    working_dir: /app
    command: >
      sh -c "
        cd /app &&
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
      "
    networks:
      - auth_network
      - spatial_network

networks:
  spatial_network:
    driver: bridge
  auth_network:
    driver: bridge

volumes:
  postgres_data:
