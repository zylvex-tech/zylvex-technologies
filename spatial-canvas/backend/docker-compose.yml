version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: spatial_canvas_db
    environment:
      POSTGRES_DB: spatial_canvas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - spatial_network

  backend:
    build: .
    container_name: spatial_canvas_backend
    depends_on:
      postgres:
        condition: service_healthy
      auth_service:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/spatial_canvas
      AUTH_SERVICE_URL: http://auth_service:8001
      API_V1_STR: /api/v1
      PROJECT_NAME: SPATIAL CANVAS
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 30
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    networks:
      - spatial_network
      - auth_network

  auth_service:
    build:
      context: ../../shared/auth
      dockerfile: Dockerfile
    container_name: spatial-canvas-auth-service
    environment:
      DATABASE_URL: postgresql://auth_user:auth_pass@postgres_auth:5432/auth_db
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-change-in-production}
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8081"
    depends_on:
      postgres_auth:
        condition: service_healthy
    ports:
      - "8001:8001"
    networks:
      - auth_network
      - spatial_network

  postgres_auth:
    image: postgres:15-alpine
    container_name: spatial-canvas-auth-db
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
      POSTGRES_DB: auth_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auth_network

networks:
  spatial_network:
    driver: bridge
  auth_network:
    driver: bridge

volumes:
  postgres_data:
