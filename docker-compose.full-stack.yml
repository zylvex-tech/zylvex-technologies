version: '3.8'

services:
  postgres-auth:
    image: postgres:15-alpine
    container_name: zylvex-auth-db
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
      POSTGRES_DB: auth_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [zylvex]

  postgres-spatial:
    image: postgis/postgis:15-3.4-alpine
    container_name: zylvex-spatial-db
    environment:
      POSTGRES_USER: spatial_user
      POSTGRES_PASSWORD: spatial_pass
      POSTGRES_DB: spatial_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spatial_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [zylvex]

  postgres-mm:
    image: postgres:15-alpine
    container_name: zylvex-mm-db
    environment:
      POSTGRES_USER: mm_user
      POSTGRES_PASSWORD: mm_pass
      POSTGRES_DB: mm_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mm_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [zylvex]

  postgres-social:
    image: postgres:15-alpine
    container_name: zylvex-social-db
    environment:
      POSTGRES_USER: social_user
      POSTGRES_PASSWORD: social_pass
      POSTGRES_DB: social_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U social_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [zylvex]

  postgres-notifications:
    image: postgres:15-alpine
    container_name: zylvex-notifications-db
    environment:
      POSTGRES_USER: notif_user
      POSTGRES_PASSWORD: notif_pass
      POSTGRES_DB: notifications_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notif_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [zylvex]

  redis:
    image: redis:7-alpine
    container_name: zylvex-redis
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [zylvex]

  auth-service:
    build: ./shared/auth
    container_name: zylvex-auth
    depends_on:
      postgres-auth:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://auth_user:auth_pass@postgres-auth:5432/auth_db
      JWT_SECRET: ${JWT_SECRET:-please-set-jwt-secret-in-env}
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8081,exp://localhost:8081"
    ports: ["8001:8001"]
    networks: [zylvex]

  spatial-canvas-backend:
    build: ./spatial-canvas/backend
    container_name: zylvex-spatial
    depends_on:
      postgres-spatial:
        condition: service_healthy
      auth-service:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://spatial_user:spatial_pass@postgres-spatial:5432/spatial_db
      JWT_SECRET_KEY: local-dev-secret-change-in-production
      AUTH_SERVICE_URL: http://auth-service:8001
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8081"
    ports: ["8000:8000"]
    networks: [zylvex]

  mind-mapper-backend:
    build: ./mind-mapper/backend-services
    container_name: zylvex-mm
    depends_on:
      postgres-mm:
        condition: service_healthy
      auth-service:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://mm_user:mm_pass@postgres-mm:5432/mm_db
      AUTH_SERVICE_URL: http://auth-service:8001
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8081"
    ports: ["8002:8002"]
    networks: [zylvex]

  social-service:
    build: ./shared/social
    container_name: zylvex-social
    depends_on:
      postgres-social:
        condition: service_healthy
      auth-service:
        condition: service_started
      spatial-canvas-backend:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://social_user:social_pass@postgres-social:5432/social_db
      AUTH_SERVICE_URL: http://auth-service:8001
      SPATIAL_CANVAS_URL: http://spatial-canvas-backend:8000
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8081,exp://localhost:8081"
    ports: ["8003:8003"]
    networks: [zylvex]

  realtime-service:
    build: ./shared/realtime
    container_name: zylvex-realtime
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
    environment:
      AUTH_SERVICE_URL: http://auth-service:8001
      REDIS_URL: redis://redis:6379
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8081,exp://localhost:8081"
      HEARTBEAT_INTERVAL: 30
    ports: ["8004:8004"]
    networks: [zylvex]

  notifications-service:
    build: ./shared/notifications
    container_name: zylvex-notifications
    depends_on:
      postgres-notifications:
        condition: service_healthy
      auth-service:
        condition: service_started
      realtime-service:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://notif_user:notif_pass@postgres-notifications:5432/notifications_db
      AUTH_SERVICE_URL: http://auth-service:8001
      REALTIME_SERVICE_URL: http://realtime-service:8004
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@zylvex.io}
      EMAIL_FROM_NAME: Zylvex
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8081,exp://localhost:8081"
    ports: ["8005:8005"]
    networks: [zylvex]

  web-app:
    build:
      context: ./web-app
      args:
        VITE_AUTH_API_URL: http://localhost:8001
        VITE_SPATIAL_API_URL: http://localhost:8000
        VITE_MIND_MAPPER_API_URL: http://localhost:8002
        VITE_NOTIFICATIONS_API_URL: http://localhost:8005
        VITE_REALTIME_WS_URL: ws://localhost:8004
    container_name: zylvex-web
    depends_on:
      - auth-service
      - spatial-canvas-backend
      - mind-mapper-backend
      - notifications-service
      - realtime-service
    ports: ["3000:80"]
    networks: [zylvex]

  docs-site:
    build: ./docs-site
    container_name: zylvex-docs
    ports: ["3001:3001"]
    networks: [zylvex]

networks:
  zylvex:
    name: zylvex-network

