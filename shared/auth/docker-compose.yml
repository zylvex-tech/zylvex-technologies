version: '3.8'

services:
  auth-db:
    image: postgres:15-alpine
    container_name: zylvex-auth-db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zylvex-auth-network

  auth-service:
    build: .
    container_name: zylvex-auth-service
    depends_on:
      auth-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:password@auth-db:5432/auth_db
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-this-in-production}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 30
      BCRYPT_ROUNDS: 12
      HOST: 0.0.0.0
      PORT: 8001
      DEBUG: ${DEBUG:-false}
    ports:
      - "8001:8001"
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8001
      "
    networks:
      - zylvex-auth-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  zylvex-auth-network:
    driver: bridge

volumes:
  auth-db-data:
