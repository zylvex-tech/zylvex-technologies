apiVersion: v1
kind: Secret
metadata:
  name: zylvex-secrets
  namespace: zylvex-production
  labels:
    app.kubernetes.io/part-of: zylvex
type: Opaque
data:
  # JWT signing key (REQUIRED — generate a strong random string)
  JWT_SECRET: "REPLACE_WITH_BASE64_ENCODED_VALUE"

  # PostgreSQL passwords
  AUTH_DB_PASSWORD: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  SPATIAL_DB_PASSWORD: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  MM_DB_PASSWORD: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  SOCIAL_DB_PASSWORD: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  NOTIF_DB_PASSWORD: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  POSTGRES_PASSWORD: "REPLACE_WITH_BASE64_ENCODED_VALUE"

  # SendGrid API key for email notifications (optional — falls back to console logging)
  SENDGRID_API_KEY: "REPLACE_WITH_BASE64_ENCODED_VALUE"

  # Database connection strings (full URLs with passwords)
  AUTH_DATABASE_URL: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  SPATIAL_DATABASE_URL: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  MM_DATABASE_URL: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  SOCIAL_DATABASE_URL: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  NOTIFICATIONS_DATABASE_URL: "REPLACE_WITH_BASE64_ENCODED_VALUE"
