apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zylvex-ingress
  namespace: zylvex-production
  labels:
    app.kubernetes.io/part-of: zylvex
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    # WebSocket support for realtime gateway
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # cert-manager Let's Encrypt integration
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - zylvex.com
        - www.zylvex.com
      secretName: zylvex-tls
  rules:
    - host: zylvex.com
      http:
        paths:
          - path: /api/auth/
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 8001
          - path: /api/spatial/
            pathType: Prefix
            backend:
              service:
                name: spatial-canvas-backend
                port:
                  number: 8000
          - path: /api/mindmapper/
            pathType: Prefix
            backend:
              service:
                name: mind-mapper-backend
                port:
                  number: 8002
          - path: /api/social/
            pathType: Prefix
            backend:
              service:
                name: social-service
                port:
                  number: 8003
          - path: /api/notify/
            pathType: Prefix
            backend:
              service:
                name: notifications-service
                port:
                  number: 8005
          - path: /ws/
            pathType: Prefix
            backend:
              service:
                name: realtime-gateway
                port:
                  number: 8004
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-app
                port:
                  number: 80
