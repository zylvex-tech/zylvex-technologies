apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: zylvex-production
  labels:
    app: auth-service
    app.kubernetes.io/part-of: zylvex
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ghcr.io/zylvex-tech/auth-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: zylvex-secrets
                  key: AUTH_DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: zylvex-secrets
                  key: JWT_SECRET
            - name: JWT_ALGORITHM
              valueFrom:
                configMapKeyRef:
                  name: zylvex-app-config
                  key: JWT_ALGORITHM
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              valueFrom:
                configMapKeyRef:
                  name: zylvex-app-config
                  key: ACCESS_TOKEN_EXPIRE_MINUTES
            - name: REFRESH_TOKEN_EXPIRE_DAYS
              valueFrom:
                configMapKeyRef:
                  name: zylvex-app-config
                  key: REFRESH_TOKEN_EXPIRE_DAYS
            - name: BCRYPT_ROUNDS
              valueFrom:
                configMapKeyRef:
                  name: zylvex-app-config
                  key: BCRYPT_ROUNDS
            - name: ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: zylvex-app-config
                  key: ALLOWED_ORIGINS
