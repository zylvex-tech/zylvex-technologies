apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications-service
  namespace: zylvex-production
  labels:
    app: notifications-service
    app.kubernetes.io/part-of: zylvex
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notifications-service
  template:
    metadata:
      labels:
        app: notifications-service
    spec:
      containers:
        - name: notifications-service
          image: ghcr.io/zylvex-tech/notifications-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8005
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: zylvex-secrets
                  key: NOTIFICATIONS_DATABASE_URL
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: zylvex-app-config
                  key: AUTH_SERVICE_URL
            - name: REALTIME_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: zylvex-app-config
                  key: REALTIME_SERVICE_URL
            - name: SENDGRID_API_KEY
              valueFrom:
                secretKeyRef:
                  name: zylvex-secrets
                  key: SENDGRID_API_KEY
            - name: EMAIL_FROM
              valueFrom:
                configMapKeyRef:
                  name: zylvex-app-config
                  key: EMAIL_FROM
            - name: ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: zylvex-app-config
                  key: ALLOWED_ORIGINS
