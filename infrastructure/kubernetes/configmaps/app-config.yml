apiVersion: v1
kind: ConfigMap
metadata:
  name: zylvex-app-config
  namespace: zylvex-production
  labels:
    app.kubernetes.io/part-of: zylvex
data:
  # --- Auth Service ---
  AUTH_SERVICE_URL: "http://auth-service.zylvex-production.svc.cluster.local:8001"
  JWT_ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "15"
  REFRESH_TOKEN_EXPIRE_DAYS: "30"
  BCRYPT_ROUNDS: "12"

  # --- Spatial Canvas ---
  SPATIAL_CANVAS_URL: "http://spatial-canvas-backend.zylvex-production.svc.cluster.local:8000"

  # --- Mind Mapper ---
  MIND_MAPPER_PORT: "8002"

  # --- Realtime Gateway ---
  REDIS_URL: "redis://redis.zylvex-production.svc.cluster.local:6379"
  HEARTBEAT_INTERVAL: "30"

  # --- Notifications ---
  REALTIME_SERVICE_URL: "http://realtime-gateway.zylvex-production.svc.cluster.local:8004"
  EMAIL_FROM: "noreply@zylvex.com"
  EMAIL_FROM_NAME: "Zylvex"

  # --- Shared ---
  ALLOWED_ORIGINS: "https://zylvex.com,https://www.zylvex.com"

  # --- Database URLs (non-secret part, passwords in Secrets) ---
  # These reference the in-cluster PostgreSQL. In production, replace with managed DB URLs.
  AUTH_DATABASE_URL: "postgresql://auth_user:$(AUTH_DB_PASSWORD)@postgres.zylvex-production.svc.cluster.local:5432/auth_db"
  SPATIAL_DATABASE_URL: "postgresql://spatial_user:$(SPATIAL_DB_PASSWORD)@postgres.zylvex-production.svc.cluster.local:5432/spatial_db"
  MM_DATABASE_URL: "postgresql://mm_user:$(MM_DB_PASSWORD)@postgres.zylvex-production.svc.cluster.local:5432/mm_db"
  SOCIAL_DATABASE_URL: "postgresql://social_user:$(SOCIAL_DB_PASSWORD)@postgres.zylvex-production.svc.cluster.local:5432/social_db"
  NOTIFICATIONS_DATABASE_URL: "postgresql://notif_user:$(NOTIF_DB_PASSWORD)@postgres.zylvex-production.svc.cluster.local:5432/notifications_db"
