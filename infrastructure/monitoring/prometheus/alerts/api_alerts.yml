groups:
  - name: api_service_alerts
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "Target {{ $labels.instance }} of job {{ $labels.job }} has been unreachable for more than 1 minute."

      - alert: HighErrorRate
        expr: >
          (
            sum by (job) (rate(http_requests_total{status=~"5.."}[5m]))
            /
            sum by (job) (rate(http_requests_total[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate on {{ $labels.job }}"
          description: "Service {{ $labels.job }} is returning > 5% 5xx responses over the last 5 minutes. Current value: {{ $value | humanizePercentage }}."

      - alert: SlowResponseTime
        expr: >
          histogram_quantile(0.99, sum by (job, le) (rate(http_request_duration_seconds_bucket[5m])))
          > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow p99 response time on {{ $labels.job }}"
          description: "Service {{ $labels.job }} p99 latency is above 2 seconds. Current value: {{ $value }}s."

      - alert: HighMemoryUsage
        expr: >
          (process_resident_memory_bytes / on(instance) machine_memory_bytes) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.job }}"
          description: "Service {{ $labels.job }} instance {{ $labels.instance }} is using more than 85% of available memory."
