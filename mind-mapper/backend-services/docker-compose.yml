version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mindmapper-postgres
    environment:
      POSTGRES_DB: mindmapper_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: mindmapper-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mindmapper_db
      AUTH_SERVICE_URL: http://host.docker.internal:8001
    ports:
      - "8002:8002"
    volumes:
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8002 --reload
      "
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
