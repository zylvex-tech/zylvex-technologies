version: '3.8'

services:
  # ─── Databases ───────────────────────────────────────────────
  postgres-auth:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
      POSTGRES_DB: auth_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [zylvex-test]

  postgres-spatial:
    image: postgis/postgis:15-3.4-alpine
    environment:
      POSTGRES_USER: spatial_user
      POSTGRES_PASSWORD: spatial_pass
      POSTGRES_DB: spatial_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spatial_user"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [zylvex-test]

  postgres-mm:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: mm_user
      POSTGRES_PASSWORD: mm_pass
      POSTGRES_DB: mm_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mm_user"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [zylvex-test]

  postgres-social:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: social_user
      POSTGRES_PASSWORD: social_pass
      POSTGRES_DB: social_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U social_user"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [zylvex-test]

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [zylvex-test]

  # ─── Application Services ───────────────────────────────────
  auth-service:
    build: ../shared/auth
    depends_on:
      postgres-auth: { condition: service_healthy }
    environment:
      DATABASE_URL: postgresql://auth_user:auth_pass@postgres-auth:5432/auth_db
      JWT_SECRET: e2e-test-secret-key-change-in-production
      ALLOWED_ORIGINS: "*"
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8001"
    networks: [zylvex-test]

  spatial-canvas-backend:
    build: ../spatial-canvas/backend
    depends_on:
      postgres-spatial: { condition: service_healthy }
      auth-service: { condition: service_started }
    environment:
      DATABASE_URL: postgresql://spatial_user:spatial_pass@postgres-spatial:5432/spatial_db
      AUTH_SERVICE_URL: http://auth-service:8001
      ALLOWED_ORIGINS: "*"
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks: [zylvex-test]

  mind-mapper-backend:
    build: ../mind-mapper/backend-services
    depends_on:
      postgres-mm: { condition: service_healthy }
      auth-service: { condition: service_started }
    environment:
      DATABASE_URL: postgresql://mm_user:mm_pass@postgres-mm:5432/mm_db
      AUTH_SERVICE_URL: http://auth-service:8001
      ALLOWED_ORIGINS: "*"
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8002"
    networks: [zylvex-test]

  social-service:
    build: ../shared/social
    depends_on:
      postgres-social: { condition: service_healthy }
      auth-service: { condition: service_started }
      spatial-canvas-backend: { condition: service_started }
    environment:
      DATABASE_URL: postgresql://social_user:social_pass@postgres-social:5432/social_db
      AUTH_SERVICE_URL: http://auth-service:8001
      SPATIAL_CANVAS_URL: http://spatial-canvas-backend:8000
      ALLOWED_ORIGINS: "*"
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8003"
    networks: [zylvex-test]

  web-app:
    build:
      context: ../web-app
      args:
        VITE_AUTH_API_URL: http://localhost:8001
        VITE_SPATIAL_API_URL: http://localhost:8000
        VITE_MIND_MAPPER_API_URL: http://localhost:8002
    depends_on:
      - auth-service
      - spatial-canvas-backend
      - mind-mapper-backend
    networks: [zylvex-test]

  # ─── Test Runner ─────────────────────────────────────────────
  e2e-runner:
    image: python:3.12-slim
    working_dir: /tests
    volumes:
      - .:/tests
    depends_on:
      - auth-service
      - spatial-canvas-backend
      - mind-mapper-backend
      - social-service
      - web-app
    environment:
      AUTH_URL: http://auth-service:8001
      SPATIAL_URL: http://spatial-canvas-backend:8000
      MINDMAP_URL: http://mind-mapper-backend:8002
      SOCIAL_URL: http://social-service:8003
      WEB_APP_URL: http://web-app:80
    command: >
      sh -c "
        pip install -r requirements.txt &&
        python -m pytest e2e/ -v --tb=short --junitxml=results/junit.xml
      "
    networks: [zylvex-test]

networks:
  zylvex-test:
    name: zylvex-test-network
