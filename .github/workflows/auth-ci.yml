name: Auth Service CI

on:
  push:
    branches: [main]
    paths:
      - 'shared/auth/**'
  pull_request:
    branches: [main]
    paths:
      - 'shared/auth/**'

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: auth_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        working-directory: ./shared/auth
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run tests with coverage
        working-directory: ./shared/auth
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/auth_test
          JWT_SECRET: test-secret-key-for-ci
        run: |
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./shared/auth/coverage.xml
          flags: auth-service

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        working-directory: ./shared/auth
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 isort
      - name: Check formatting with black
        working-directory: ./shared/auth
        run: black --check .
      - name: Lint with flake8
        working-directory: ./shared/auth
        run: flake8 .

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        working-directory: ./shared/auth
        run: docker build -t auth-service:ci .
      - name: Test Docker image
        working-directory: ./shared/auth
        run: |
          docker run -d --name auth-ci-test \
            -e DATABASE_URL=postgresql://postgres:postgres@postgres:5432/auth_test \
            -e JWT_SECRET=test-secret \
            -p 8001:8001 \
            auth-service:ci
          sleep 10
          curl -f http://localhost:8001/health || exit 1
          docker stop auth-ci-test
          docker rm auth-ci-test
