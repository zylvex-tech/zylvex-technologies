name: Mind Mapper CI

on:
  push:
    branches: [main]
    paths:
      - 'mind-mapper/**'
      - '.github/workflows/mind-mapper-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mind-mapper/**'
      - '.github/workflows/mind-mapper-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mm_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./mind-mapper/backend-services
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        working-directory: ./mind-mapper/backend-services
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mm_test
          AUTH_SERVICE_URL: http://localhost:8001
        run: |
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./mind-mapper/backend-services/coverage.xml
          flags: mind-mapper-backend

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./mind-mapper/backend-services
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 isort

      - name: Check formatting with black
        working-directory: ./mind-mapper/backend-services
        run: black --check .

      - name: Lint with flake8
        working-directory: ./mind-mapper/backend-services
        run: flake8 .

  mobile-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        working-directory: ./mind-mapper/mobile-bci
        run: npx tsc --noEmit

      - name: Lint
        working-directory: ./mind-mapper/mobile-bci
        run: npx eslint src/ --ext .ts,.tsx

      - name: Run tests
        working-directory: ./mind-mapper/mobile-bci
        run: npm test -- --passWithNoTests

  build:
    runs-on: ubuntu-latest
    needs: [test, mobile-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        working-directory: ./mind-mapper/backend-services
        run: |
          docker build -t mind-mapper-backend:latest .

      - name: Verify Docker image health check URL
        run: |
          docker run -d --name mm-test -e DATABASE_URL=sqlite:// -e AUTH_SERVICE_URL=http://localhost:8001 mind-mapper-backend:latest || true
          sleep 5
          docker stop mm-test || true
          docker rm mm-test || true

