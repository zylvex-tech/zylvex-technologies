name: Mind Mapper CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'mind-mapper/**'
      - '.github/workflows/mind-mapper-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'mind-mapper/**'
      - '.github/workflows/mind-mapper-ci.yml'

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_mindmapper
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      working-directory: ./mind-mapper/backend-services
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio httpx
    
    - name: Run migrations
      working-directory: ./mind-mapper/backend-services
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_mindmapper
      run: |
        alembic upgrade head
    
    - name: Run tests
      working-directory: ./mind-mapper/backend-services
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_mindmapper
        AUTH_SERVICE_URL: http://localhost:8001
        JWT_SECRET_KEY: test-secret-key-change-in-production
      run: |
        pytest tests/ -v --tb=short
    
    - name: Lint with flake8
      working-directory: ./mind-mapper/backend-services
      run: |
        pip install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  mobile-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: './mind-mapper/mobile-bci/package-lock.json'
    
    - name: Install dependencies
      working-directory: ./mind-mapper/mobile-bci
      run: npm ci
    
    - name: Type check
      working-directory: ./mind-mapper/mobile-bci
      run: npx tsc --noEmit
    
    - name: Lint
      working-directory: ./mind-mapper/mobile-bci
      run: npx eslint src/ --ext .ts,.tsx
    
    - name: Run tests
      working-directory: ./mind-mapper/mobile-bci
      run: npm test -- --passWithNoTests

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, mobile-tests]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build backend Docker image
      working-directory: ./mind-mapper/backend-services
      run: |
        docker build -t mind-mapper-backend:latest .
    
    - name: Test Docker Compose
      working-directory: ./mind-mapper/backend-services
      run: |
        docker-compose -f docker-compose.yml config

  notify:
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: always()
    
    steps:
    - name: Notify Slack on failure
      if: failure()
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        fields: repo,message,commit,author,action,eventName,ref,workflow,job,took
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    
    - name: Notify Slack on success
      if: success()
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        fields: repo,message,commit,author,action,eventName,ref,workflow,job,took
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
