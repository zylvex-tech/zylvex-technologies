name: E2E Tests

on:
  pull_request:
    branches: [main]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Build and start full stack
        working-directory: tests
        run: |
          docker compose -f docker-compose.tests.yml up -d --build \
            postgres-auth postgres-spatial postgres-mm postgres-social redis

          echo "Waiting for databases..."
          sleep 10

          docker compose -f docker-compose.tests.yml up -d --build \
            auth-service spatial-canvas-backend mind-mapper-backend social-service web-app

          echo "Waiting for services to be ready..."
          sleep 30

      - name: Run E2E tests
        working-directory: tests
        run: |
          mkdir -p results
          docker compose -f docker-compose.tests.yml run --rm e2e-runner

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: tests/results/junit.xml
          retention-days: 30

      - name: Tear down stack
        if: always()
        working-directory: tests
        run: docker compose -f docker-compose.tests.yml down -v --remove-orphans
