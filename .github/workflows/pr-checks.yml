name: PR Quality Gate

on:
  pull_request:
    branches: [main]

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Check PR description
        run: |
          if [ -z "${{ github.event.pull_request.body }}" ]; then
            echo "❌ PR description is empty. Please add a description."
            exit 1
          fi
          echo "✅ PR description is present"
      
      - name: Check branch naming convention
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          if [[ ! "$BRANCH_NAME" =~ ^(feature|bugfix|release|fix|chore|copilot)/ ]]; then
            echo "❌ Branch name '$BRANCH_NAME' does not follow convention: feature/*, bugfix/*, release/*, fix/*, chore/*, or copilot/*"
            exit 1
          fi
          echo "✅ Branch name '$BRANCH_NAME' follows convention"
      
      - name: Analyze changed files
        id: changed-files
        run: |
          echo "Changed files in PR:"
          git diff --name-only origin/main...HEAD
          
          # Determine which services were changed
          CHANGED_AUTH=$(git diff --name-only origin/main...HEAD | grep -q '^shared/auth/' && echo 'true' || echo 'false')
          CHANGED_SPATIAL=$(git diff --name-only origin/main...HEAD | grep -q '^spatial-canvas/backend/' && echo 'true' || echo 'false')
          CHANGED_MOBILE=$(git diff --name-only origin/main...HEAD | grep -q '^spatial-canvas/mobile/' && echo 'true' || echo 'false')
          CHANGED_WEB=$(git diff --name-only origin/main...HEAD | grep -q '^web-app/' && echo 'true' || echo 'false')
          
          echo "auth_changed=$CHANGED_AUTH" >> $GITHUB_OUTPUT
          echo "spatial_changed=$CHANGED_SPATIAL" >> $GITHUB_OUTPUT
          echo "mobile_changed=$CHANGED_MOBILE" >> $GITHUB_OUTPUT
          echo "web_changed=$CHANGED_WEB" >> $GITHUB_OUTPUT
      
      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const { auth_changed, spatial_changed, mobile_changed, web_changed } = process.env;
            const services = [];
            if (auth_changed === 'true') services.push('Auth Service');
            if (spatial_changed === 'true') services.push('Spatial Canvas Backend');
            if (mobile_changed === 'true') services.push('Mobile App');
            if (web_changed === 'true') services.push('Web App');
            
            const comment = `## PR Analysis
            
            **Services changed:** ${services.length > 0 ? services.join(', ') : 'None (only documentation or config)'}
            
            **Branch:** ${context.payload.pull_request.head.ref}
            **Author:** ${context.payload.pull_request.user.login}
            
            ### Quality Checks Passed ✅
            - PR description present
            - Branch naming convention followed
            
            ### Next Steps
            ${services.length > 0 ? 'The following CI workflows will run:' : 'No service changes detected, only documentation/config updates.'}
            ${services.map(s => `- ${s} CI`).join('\n')}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
        env:
          auth_changed: ${{ steps.changed-files.outputs.auth_changed }}
          spatial_changed: ${{ steps.changed-files.outputs.spatial_changed }}
          mobile_changed: ${{ steps.changed-files.outputs.mobile_changed }}
          web_changed: ${{ steps.changed-files.outputs.web_changed }}

  web-app-ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: |
      contains(github.event.pull_request.changed_files != 0, 'web-app') ||
      true
    defaults:
      run:
        working-directory: web-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check & Build
        run: npm run build
        env:
          VITE_AUTH_API_URL: http://localhost:8001
          VITE_SPATIAL_API_URL: http://localhost:8000
          VITE_MIND_MAPPER_API_URL: http://localhost:8002
