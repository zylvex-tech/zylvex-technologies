name: Deploy to Staging

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - '.github/**'

permissions:
  contents: read

jobs:
  deploy-auth:
    if: ${{ secrets.STAGING_HOST != '' && secrets.STAGING_USER != '' && secrets.STAGING_SSH_KEY != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Auth Service
        uses: appleboy/ssh-action@v1.0.3
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: JWT_SECRET
          script: |
            cd /opt/zylvex/shared/auth
            git pull origin main
            docker-compose down
            docker-compose up -d --build
            echo "Auth service deployed successfully"

  deploy-spatial-canvas:
    if: ${{ secrets.STAGING_HOST != '' && secrets.STAGING_USER != '' && secrets.STAGING_SSH_KEY != '' }}
    runs-on: ubuntu-latest
    needs: deploy-auth
    steps:
      - name: Deploy Spatial Canvas Backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/zylvex/spatial-canvas/backend
            git pull origin main
            docker-compose down
            docker-compose up -d --build
            echo "Spatial Canvas backend deployed successfully"

  deploy-mind-mapper:
    if: ${{ secrets.STAGING_HOST != '' && secrets.STAGING_USER != '' && secrets.STAGING_SSH_KEY != '' }}
    runs-on: ubuntu-latest
    needs: deploy-auth
    steps:
      - name: Deploy Mind Mapper Backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/zylvex/mind-mapper/backend-services
            git pull origin main
            docker-compose down
            docker-compose up -d --build
            echo "Mind Mapper backend deployed successfully"

  notify:
    runs-on: ubuntu-latest
    needs: [deploy-auth, deploy-spatial-canvas, deploy-mind-mapper]
    if: always()
    steps:
      - name: Send Slack notification
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          author_name: GitHub Actions
          fields: repo,message,commit,author,action,eventName,ref,workflow,job,took
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
